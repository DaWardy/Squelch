name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # 3.12 is the primary target (LTS, validated in venv).
        # 3.13 is a smoke check — all tests run, coverage uploaded on 3.12 only.
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system deps (Linux only)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libportaudio2 libegl1

    - name: Install Mesa OpenGL (Windows only)
      if: runner.os == 'Windows'
      run: pip install pyopengl

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-${{ matrix.python-version }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
        restore-keys: ${{ runner.os }}-${{ matrix.python-version }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run pyflakes (undefined names)
      run: |
        python -m pyflakes core/ ui/ network/ modes/ aprs/ winlink/ sdr/ digital/ dsp/

    - name: Run tests
      env:
        QT_QPA_PLATFORM: offscreen
        QT_OPENGL: software
      run: |
        python -m pytest tests/ -q --tb=short \
          --timeout=120 \
          --cov=core --cov=network --cov=modes \
          --cov=aprs --cov=winlink \
          --cov-report=term-missing \
          --cov-report=xml

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      with:
        file: coverage.xml
        fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install security tools
      run: pip install bandit pip-audit

    - name: Run bandit (SAST)
      run: |
        bandit -r . \
          --exclude ./.git,./venv,./offline_packages \
          --severity-level high \
          -f txt
        echo "Bandit scan complete"

    - name: Run pip-audit (dependency vulnerabilities)
      run: |
        pip install -r requirements.txt
        pip-audit --desc on
        echo "pip-audit complete"

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Syntax check all files
      run: |
        python -c "
        import ast, sys
        from pathlib import Path
        errors = 0
        for f in Path('.').rglob('*.py'):
            if any(x in str(f) for x in ['__pycache__','venv']):
                continue
            try:
                ast.parse(f.read_text(encoding='utf-8', errors='replace'))
            except SyntaxError as e:
                print(f'SYNTAX ERROR {f}: {e}')
                errors += 1
        sys.exit(errors)
        "

    - name: Check from __future__ placement
      run: |
        python -c "
        from pathlib import Path
        bad = []
        for f in Path('.').rglob('*.py'):
            if any(x in str(f) for x in ['__pycache__','venv']):
                continue
            content = f.read_text(encoding='utf-8', errors='replace')
            if '\"\"\"\\nfrom __future__' in content:
                bad.append(str(f))
        if bad:
            print('BAD __future__ placement:')
            for f in bad: print(f'  {f}')
            exit(1)
        print('All __future__ placements OK')
        "
