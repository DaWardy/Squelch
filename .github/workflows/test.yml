name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libportaudio2 libegl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyflakes
          pip install -r requirements.txt

      - name: QA gate (undefined names)
        run: python -m pyflakes ui core modes network || true

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -q

      - name: Syntax check all .py files
        run: |
          python -c "
          import ast
          from pathlib import Path
          errs = []
          for f in Path('.').rglob('*.py'):
              if '__pycache__' in str(f) or 'venv' in str(f): continue
              try: ast.parse(f.read_text(encoding='utf-8', errors='replace'))
              except SyntaxError as e: errs.append(f'{f}:{e.lineno}')
          if errs:
              for e in errs: print(f'ERROR: {e}')
              exit(1)
          "
